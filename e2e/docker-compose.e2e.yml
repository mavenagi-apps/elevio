services:
  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  inngest:
    image: inngest/inngest:latest
    command: inngest dev --no-discovery -u http://host.docker.internal:3099/api/inngest
    ports:
      - "8299:8288"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
